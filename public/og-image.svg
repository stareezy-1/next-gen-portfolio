<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050508"/>
      <stop offset="50%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#050508"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00cc6a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="topBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#00ff88"/>
    </linearGradient>
    <linearGradient id="nameLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0"/>
      <stop offset="20%" stop-color="#00ff88" stop-opacity="0.8"/>
      <stop offset="80%" stop-color="#00ff88" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glowRight" cx="85%" cy="30%" r="45%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowLeft" cx="15%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <filter id="textGlow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow orbs -->
  <ellipse cx="1020" cy="190" rx="380" ry="320" fill="url(#glowRight)"/>
  <ellipse cx="180" cy="440" rx="320" ry="280" fill="url(#glowLeft)"/>

  <!-- Grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="60" x2="1200" y2="60" stroke="#00ff88" stroke-width="0.8"/>
    <line x1="0" y1="120" x2="1200" y2="120" stroke="#00ff88" stroke-width="0.8"/>
    <line x1="0" y1="180" x2="1200" y2="180" stroke="#00ff88" stroke-width="0.8"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke="#00ff88" stroke-width="0.8"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#00ff88" stroke-width="0.8"/>
    <line x1="0" y1="360" x2="1200" y2="360" stroke="#00ff88" stroke-width="0.8"/>
    <line x1="0" y1="420" x2="1200" y2="420" stroke="#00ff88" stroke-width="0.8"/>
    <line x1="0" y1="480" x2="1200" y2="480" stroke="#00ff88" stroke-width="0.8"/>
    <line x1="0" y1="540" x2="1200" y2="540" stroke="#00ff88" stroke-width="0.8"/>
    <line x1="60" y1="0" x2="60" y2="630" stroke="#00ff88" stroke-width="0.8"/>
    <line x1="120" y1="0" x2="120" y2="630" stroke="#00ff88" stroke-width="0.8"/>
    <line x1="180" y1="0" x2="180" y2="630" stroke="#00ff88" stroke-width="0.8"/>
    <line x1="240" y1="0" x2="240" y2="630" stroke="#00ff88" stroke-width="0.8"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="#00ff88" stroke-width="0.8"/>
    <line x1="360" y1="0" x2="360" y2="630" stroke="#00ff88" stroke-width="0.8"/>
    <line x1="420" y1="0" x2="420" y2="630" stroke="#00ff88" stroke-width="0.8"/>
    <line x1="480" y1="0" x2="480" y2="630" stroke="#00ff88" stroke-width="0.8"/>
    <line x1="540" y1="0" x2="540" y2="630" stroke="#00ff88" stroke-width="0.8"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#00ff88" stroke-width="0.8"/>
    <line x1="660" y1="0" x2="660" y2="630" stroke="#00ff88" stroke-width="0.8"/>
    <line x1="720" y1="0" x2="720" y2="630" stroke="#00ff88" stroke-width="0.8"/>
    <line x1="780" y1="0" x2="780" y2="630" stroke="#00ff88" stroke-width="0.8"/>
    <line x1="840" y1="0" x2="840" y2="630" stroke="#00ff88" stroke-width="0.8"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="#00ff88" stroke-width="0.8"/>
    <line x1="960" y1="0" x2="960" y2="630" stroke="#00ff88" stroke-width="0.8"/>
    <line x1="1020" y1="0" x2="1020" y2="630" stroke="#00ff88" stroke-width="0.8"/>
    <line x1="1080" y1="0" x2="1080" y2="630" stroke="#00ff88" stroke-width="0.8"/>
    <line x1="1140" y1="0" x2="1140" y2="630" stroke="#00ff88" stroke-width="0.8"/>
  </g>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#topBar)"/>

  <!-- Left vertical accent line -->
  <rect x="72" y="80" width="3" height="470" rx="1.5" fill="url(#brand)" opacity="0.4"/>

  <!-- Available badge -->
  <rect x="100" y="88" width="248" height="36" rx="18" fill="none" stroke="#00ff88" stroke-width="1.5" stroke-opacity="0.5"/>
  <rect x="100" y="88" width="248" height="36" rx="18" fill="#00ff88" fill-opacity="0.07"/>
  <circle cx="124" cy="106" r="5" fill="#00ff88"/>
  <text x="138" y="112" font-family="'SF Pro Display','Inter',system-ui,sans-serif" font-size="15" font-weight="600" fill="#00ff88" letter-spacing="0.5">Available for new projects</text>

  <!-- Name — two lines -->
  <text x="100" y="210"
    font-family="'SF Pro Display','Inter',system-ui,sans-serif"
    font-size="80" font-weight="900"
    fill="#ffffff"
    letter-spacing="-2"
    filter="url(#textGlow)"
  >Muhammad Bintang</text>

  <text x="100" y="300"
    font-family="'SF Pro Display','Inter',system-ui,sans-serif"
    font-size="80" font-weight="900"
    fill="url(#brand)"
    letter-spacing="-2"
    filter="url(#textGlow)"
  >Al Akbar</text>

  <!-- Name underline -->
  <rect x="100" y="316" width="520" height="3" rx="1.5" fill="url(#nameLine)"/>

  <!-- Role -->
  <text x="100" y="368"
    font-family="'SF Pro Display','Inter',system-ui,sans-serif"
    font-size="24" font-weight="500"
    fill="#888888"
    letter-spacing="0.5"
  >Senior Front-End &amp; Mobile Engineer  ·  WSA Global Winner</text>

  <!-- Divider -->
  <rect x="100" y="400" width="1000" height="1" fill="#1a1a2e"/>

  <!-- Tech pills row -->
  <g transform="translate(100, 420)">
    <!-- React -->
    <rect x="0" y="0" width="100" height="36" rx="8" fill="#0a0a14" stroke="#1e1e3a" stroke-width="1"/>
    <text x="50" y="23" font-family="'SF Pro Display','Inter',system-ui,sans-serif" font-size="14" font-weight="600" fill="#00ff88" text-anchor="middle">React</text>
    <!-- React Native -->
    <rect x="112" y="0" width="148" height="36" rx="8" fill="#0a0a14" stroke="#1e1e3a" stroke-width="1"/>
    <text x="186" y="23" font-family="'SF Pro Display','Inter',system-ui,sans-serif" font-size="14" font-weight="600" fill="#00ff88" text-anchor="middle">React Native</text>
    <!-- TypeScript -->
    <rect x="272" y="0" width="130" height="36" rx="8" fill="#0a0a14" stroke="#1e1e3a" stroke-width="1"/>
    <text x="337" y="23" font-family="'SF Pro Display','Inter',system-ui,sans-serif" font-size="14" font-weight="600" fill="#00ff88" text-anchor="middle">TypeScript</text>
    <!-- Next.js -->
    <rect x="414" y="0" width="100" height="36" rx="8" fill="#0a0a14" stroke="#1e1e3a" stroke-width="1"/>
    <text x="464" y="23" font-family="'SF Pro Display','Inter',system-ui,sans-serif" font-size="14" font-weight="600" fill="#00ff88" text-anchor="middle">Next.js</text>
    <!-- Expo -->
    <rect x="526" y="0" width="80" height="36" rx="8" fill="#0a0a14" stroke="#1e1e3a" stroke-width="1"/>
    <text x="566" y="23" font-family="'SF Pro Display','Inter',system-ui,sans-serif" font-size="14" font-weight="600" fill="#00ff88" text-anchor="middle">Expo</text>
    <!-- AWS Amplify -->
    <rect x="618" y="0" width="140" height="36" rx="8" fill="#0a0a14" stroke="#1e1e3a" stroke-width="1"/>
    <text x="688" y="23" font-family="'SF Pro Display','Inter',system-ui,sans-serif" font-size="14" font-weight="600" fill="#00ff88" text-anchor="middle">AWS Amplify</text>
  </g>

  <!-- Stats row -->
  <g transform="translate(100, 490)">
    <!-- 3+ years -->
    <text x="0" y="0" font-family="'SF Pro Display','Inter',system-ui,sans-serif" font-size="44" font-weight="900" fill="url(#brand)" letter-spacing="-1">3+</text>
    <text x="0" y="26" font-family="'SF Pro Display','Inter',system-ui,sans-serif" font-size="14" fill="#555566" letter-spacing="0.5">Years Experience</text>
    <!-- 9+ projects -->
    <text x="180" y="0" font-family="'SF Pro Display','Inter',system-ui,sans-serif" font-size="44" font-weight="900" fill="url(#brand)" letter-spacing="-1">9+</text>
    <text x="180" y="26" font-family="'SF Pro Display','Inter',system-ui,sans-serif" font-size="14" fill="#555566" letter-spacing="0.5">Projects Shipped</text>
    <!-- WSA -->
    <text x="360" y="0" font-family="'SF Pro Display','Inter',system-ui,sans-serif" font-size="44" font-weight="900" fill="url(#accent)" letter-spacing="-1">WSA</text>
    <text x="360" y="26" font-family="'SF Pro Display','Inter',system-ui,sans-serif" font-size="14" fill="#555566" letter-spacing="0.5">Global Winner</text>
  </g>

  <!-- Right side — large B lettermark -->
  <text x="1050" y="520"
    font-family="'SF Pro Display','Inter',system-ui,sans-serif"
    font-size="480" font-weight="900"
    fill="url(#brand)"
    text-anchor="middle"
    opacity="0.04"
    letter-spacing="-20"
  >B</text>

  <!-- URL bottom right -->
  <text x="1128" y="598"
    font-family="'SF Pro Display','Inter',system-ui,sans-serif"
    font-size="18" fill="#333344"
    text-anchor="end"
    letter-spacing="0.5"
  >stareezy.tech</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#topBar)" opacity="0.4"/>
</svg>
