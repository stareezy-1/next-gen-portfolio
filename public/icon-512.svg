<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#050508"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00cc6a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0"/>
      <stop offset="25%" stop-color="#00ff88" stop-opacity="0.9"/>
      <stop offset="75%" stop-color="#00ff88" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="round">
      <rect width="512" height="512" rx="112"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g clip-path="url(#round)" opacity="0.07">
    <line x1="0" y1="64" x2="512" y2="64" stroke="#00ff88" stroke-width="1"/>
    <line x1="0" y1="128" x2="512" y2="128" stroke="#00ff88" stroke-width="1"/>
    <line x1="0" y1="192" x2="512" y2="192" stroke="#00ff88" stroke-width="1"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="#00ff88" stroke-width="1"/>
    <line x1="0" y1="320" x2="512" y2="320" stroke="#00ff88" stroke-width="1"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="#00ff88" stroke-width="1"/>
    <line x1="0" y1="448" x2="512" y2="448" stroke="#00ff88" stroke-width="1"/>
    <line x1="64" y1="0" x2="64" y2="512" stroke="#00ff88" stroke-width="1"/>
    <line x1="128" y1="0" x2="128" y2="512" stroke="#00ff88" stroke-width="1"/>
    <line x1="192" y1="0" x2="192" y2="512" stroke="#00ff88" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="#00ff88" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="512" stroke="#00ff88" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="#00ff88" stroke-width="1"/>
    <line x1="448" y1="0" x2="448" y2="512" stroke="#00ff88" stroke-width="1"/>
  </g>

  <!-- Glow blob -->
  <ellipse cx="256" cy="240" rx="200" ry="190" fill="url(#glow)"/>

  <!-- Border -->
  <rect width="512" height="512" rx="112" fill="none" stroke="url(#brand)" stroke-width="3" stroke-opacity="0.3"/>

  <!-- Corner accents — top-left brand, bottom-right accent -->
  <path d="M 0 112 L 0 28 Q 0 0 28 0 L 112 0" fill="none" stroke="url(#brand)" stroke-width="6" stroke-linecap="round"/>
  <path d="M 512 400 L 512 484 Q 512 512 484 512 L 400 512" fill="none" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>

  <!-- Star dots -->
  <circle cx="72" cy="72" r="6" fill="#00ff88" opacity="0.6"/>
  <circle cx="440" cy="72" r="4" fill="#00ff88" opacity="0.3"/>
  <circle cx="440" cy="440" r="6" fill="#7c3aed" opacity="0.55"/>
  <circle cx="72" cy="440" r="4" fill="#7c3aed" opacity="0.3"/>
  <!-- Micro stars -->
  <circle cx="168" cy="52" r="2.5" fill="#00ff88" opacity="0.25"/>
  <circle cx="344" cy="460" r="2.5" fill="#00ff88" opacity="0.25"/>
  <circle cx="52" cy="220" r="2" fill="#00ff88" opacity="0.2"/>
  <circle cx="460" cy="292" r="2" fill="#7c3aed" opacity="0.2"/>

  <!-- Letter B — main lettermark -->
  <text
    x="256" y="352"
    font-family="'SF Pro Display','Inter','Helvetica Neue',Arial,sans-serif"
    font-size="290"
    font-weight="900"
    fill="url(#brand)"
    text-anchor="middle"
    filter="url(#softGlow)"
    letter-spacing="-10"
  >B</text>

  <!-- Underline accent bar -->
  <rect x="136" y="386" width="240" height="8" rx="4" fill="url(#barGrad)"/>

  <!-- Three dots -->
  <circle cx="192" cy="424" r="6" fill="#00ff88" opacity="0.4"/>
  <circle cx="256" cy="424" r="7.5" fill="#00ff88" opacity="0.8"/>
  <circle cx="320" cy="424" r="6" fill="#00ff88" opacity="0.4"/>
</svg>
